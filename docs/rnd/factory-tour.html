<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>설계도 공장 카메라 투어 · R&D</title>
<style>

@font-face{font-family:'Pretendard'; font-style:normal; font-weight:45 920; font-display:swap;
  src:url("../fonts/PretendardVariable.woff2") format("woff2")}
@font-face{font-family:'JetBrains Mono'; font-style:normal; font-weight:400 700; font-display:swap;
  src:url("../fonts/JetBrainsMono.woff2") format("woff2")}
:root{
  --bg:#0d1220; --ink:#eef2fb; --mut:#8496b3; --dim:#5d6c85;
  --panel:#131a26; --line:#28324a;
  --net:#6cc7ff; --game:#ffb648; --store:#57d694;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --mono:'JetBrains Mono',ui-monospace,"Cascadia Code",Consolas,"D2Coding",monospace;
}
*{box-sizing:border-box}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.6;
  -webkit-font-smoothing:antialiased; word-break:keep-all; font-variant-numeric:tabular-nums;
  background-image:radial-gradient(rgba(108,199,255,.05) 1px, transparent 1px); background-size:26px 26px}
.wrap{max-width:1280px; margin:0 auto; padding:26px 24px 40px}

/* ── 헤더 ── */
.head .eb{font-family:var(--mono); font-size:.72rem; letter-spacing:.22em; color:var(--net); text-transform:uppercase}
.head h1{margin:8px 0 0; font-size:2rem; font-weight:800; letter-spacing:-.03em; text-wrap:balance}
.head h1 .g{color:var(--game)}

/* ── 범례 ── */
.legend{display:flex; flex-wrap:wrap; gap:8px 18px; margin:18px 0 4px; font-size:.8rem; color:var(--mut)}
.legend .lg{display:inline-flex; align-items:center; gap:7px}
.legend .lg i{width:22px; height:7px; border-radius:4px}
.legend .lg.recv i{background:var(--net)} .legend .lg.send i{background:var(--game)} .legend .lg.store i{background:var(--store)}
.legend .lg.hub i{width:13px; height:13px; border-radius:50%; border:2.5px solid #cfe0f2; background:var(--bg)}
.legend .tip{margin-left:auto; font-family:var(--mono); font-size:.72rem; color:var(--dim)}

/* ── 무대 ── */
.stage{position:relative; margin-top:12px; border:1px solid var(--line); border-radius:18px; overflow:hidden;
  background:linear-gradient(180deg,#0c1120,#0a0e1a);
  box-shadow:0 40px 80px -50px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.03)}
#scene{display:block; width:100%; height:auto}
#scene .top{transition:filter .15s}
#scene .bld{cursor:pointer}
#scene .bld:hover .top{filter:brightness(1.12)}
#scene .bld:focus-visible{outline:none}
#scene .bld:focus-visible .fx{opacity:1}
.fx{opacity:0}

/* ── 정보 카드 (빈 우하단으로) ── */
.card{position:absolute; right:16px; bottom:16px; width:322px; max-height:calc(100% - 32px); overflow-y:auto; z-index:6;
  background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 16px; color:#dbe4f2;
  box-shadow:0 30px 60px -28px rgba(0,0,0,.7); display:none}
.card.on{display:block}
.card .x{position:absolute; top:11px; right:11px; width:27px; height:27px; border:1px solid #33405a; border-radius:8px;
  color:#9fb0cc; display:grid; place-items:center; font-size:.85rem; background:#1a2333; cursor:pointer}
.card .x:hover{border-color:var(--net)}
.card .k{font-family:var(--mono); font-size:.62rem; letter-spacing:.11em; color:var(--mut); text-transform:uppercase}
.card h3{margin:7px 0 0; font-size:1.1rem; font-weight:800}
.card h3 span{color:var(--mut); font-weight:700; font-size:.9rem; margin-left:5px}
.card .lead{margin:9px 0 0; font-size:.82rem; color:#b7c4da; line-height:1.62}
.card .lb{font-family:var(--mono); font-size:.6rem; letter-spacing:.1em; color:var(--mut); margin:13px 0 4px; text-transform:uppercase}
.card .it{border-top:1px solid #232e42; padding:6px 1px; font-size:.79rem; font-weight:600; display:flex; gap:8px; align-items:baseline}
.card .rs{font-family:var(--mono); font-size:.57rem; font-weight:800; padding:1px 6px; border-radius:999px; border:1.4px solid; flex:0 0 auto}
.card .rs.ok{color:var(--store); border-color:#2e7d54}
.card .rs.rj{color:#ff9a8d; border-color:#8d4a42}
.card .none{font-size:.8rem; color:var(--dim)}

.hint{position:absolute; left:16px; top:14px; z-index:4; font-family:var(--mono); font-size:.7rem; color:var(--dim)}

.foot{margin-top:16px; display:flex; gap:14px 26px; flex-wrap:wrap; font-size:.83rem}
.foot .pf{color:#a7b6cf} .foot .pf b{color:var(--store); font-weight:800}
.foot .cf{color:var(--mut)} .foot .cf b{color:var(--game); font-weight:800}

/* ── 탭 네비 ── */
.tabs{display:flex; gap:2px; margin:22px 0 0; border-bottom:1px solid var(--line); flex-wrap:wrap}
.tab{padding:11px 18px; font-size:.94rem; font-weight:700; color:var(--mut); background:none; border:none;
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; transition:color .15s, border-color .15s}
.tab:hover{color:var(--ink)}
.tab.act{color:var(--ink); border-bottom-color:var(--net)}
.tab:focus-visible{outline:2px solid var(--net); outline-offset:-2px; border-radius:6px}
.panel{margin-top:18px}
.panel[hidden]{display:none}
.panel .lead{color:var(--mut); font-size:.95rem; max-width:74ch; margin:0 0 14px}
.panel .lead b{color:var(--ink); font-weight:700}

/* ── 병목 개선 카드 ── */
.exp-h{margin:6px 0 10px; font-family:var(--mono); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--mut)}
.exp-h .cnt{color:var(--ink); margin-left:4px}
.exp-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(272px,1fr)); gap:12px; margin-bottom:22px}
.exp{border:1px solid var(--line); border-radius:14px; padding:14px 16px; background:#0f1626}
.exp .top{display:flex; align-items:center; gap:8px}
.exp .rs{font-family:var(--mono); font-size:.57rem; font-weight:800; padding:2px 7px; border-radius:999px; border:1.4px solid; flex:0 0 auto}
.exp .rs.ok{color:var(--store); border-color:#2e7d54}
.exp .rs.rj{color:#ff9a8d; border-color:#8d4a42}
.exp .nm{font-weight:800; font-size:.98rem}
.exp .r{font-size:1.5rem; font-weight:800; letter-spacing:-.02em; margin:9px 0 3px; color:var(--store)}
.exp.rj .r{color:#ff9a8d; font-size:1.05rem}
.exp .m{font-size:.82rem; color:#b7c4da; line-height:1.55}
.exp .ex{margin-top:8px; font-family:var(--mono); font-size:.68rem; color:var(--mut)}

/* ── 더미·기타 리스트 ── */
.note-list{display:grid; gap:10px; max-width:82ch}
.note{border:1px solid var(--line); border-radius:12px; padding:13px 15px; background:#0f1626}
.note .h{font-weight:800; font-size:.95rem; margin-bottom:4px; color:var(--ink)}
.note .d{font-size:.84rem; color:#b7c4da; line-height:1.62}
.note .d b{color:var(--ink)}
.links{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px}
.links a{font-family:var(--mono); font-size:.82rem; color:var(--net); border:1px solid var(--line); border-radius:10px; padding:9px 14px; text-decoration:none; transition:border-color .15s}
.links a:hover{border-color:var(--net)}

@media(max-width:680px){ .card{width:calc(100% - 32px); right:16px; left:16px} .head h1{font-size:1.6rem} }
@media(prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}


/* ===== camera tour shell (overrides mmo) ===== */
html{scroll-behavior:smooth}
body{overflow-x:clip; background-image:none}
.prog{position:fixed;top:0;left:0;height:3px;width:0;z-index:90;background:linear-gradient(90deg,#2b86e0,#6cc7ff);box-shadow:0 0 10px rgba(108,199,255,.5)}
.intro{min-height:92vh;display:flex;align-items:center;position:relative;overflow:hidden;max-width:1180px;margin:0 auto;padding:0 clamp(18px,4vw,40px)}
.intro::after{content:"";position:absolute;inset:0;opacity:.4;pointer-events:none;background-image:linear-gradient(#28324a 1px,transparent 1px),linear-gradient(90deg,#28324a 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(120% 80% at 70% 0%,#000,transparent 60%)}
.intro .in{position:relative;z-index:1}
.eb{font-family:var(--mono);font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--net);display:inline-flex;align-items:center;gap:.6em}
.eb .dot{width:7px;height:7px;border-radius:50%;background:var(--net);box-shadow:0 0 0 4px rgba(108,199,255,.15)}
.intro h1{margin:.5em 0 0;font-size:clamp(1.8rem,4vw,2.9rem);font-weight:800;letter-spacing:-.03em;line-height:1.14}
.intro h1 .g{color:var(--game)}
.intro p{margin:1em 0 0;color:var(--mut);max-width:54ch;font-size:1.05rem}
.intro p b{color:var(--ink);font-weight:700}
.cue{margin-top:2.2em;display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.82rem;color:var(--mut)}
.cue .m{width:22px;height:34px;border-radius:12px;border:1.6px solid var(--line);position:relative}
.cue .m::after{content:"";position:absolute;left:50%;top:7px;width:3px;height:7px;border-radius:2px;background:var(--net);transform:translateX(-50%);animation:cue 1.6s infinite}
@keyframes cue{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}80%{opacity:0;transform:translate(-50%,10px)}100%{opacity:0}}
.tour{position:relative}
.viewport{position:sticky;top:0;height:100vh;overflow:hidden;display:flex;align-items:center;background:radial-gradient(90% 70% at 40% 30%,rgba(108,199,255,.05),transparent 60%)}
.stage{position:relative!important;width:100%!important;margin:0!important;border:0!important;border-radius:0!important;box-shadow:none!important;background:transparent!important;overflow:visible!important}
/* 넓은 창에서 SVG 높이가 100vh를 넘어 viewport(overflow:hidden)에 위아래가 잘리던 문제 →
   max-height로 세로를 뷰포트에 가두고 meet가 전체를 담게 함(가로는 자동 레터박스) */
#scene{width:100%!important;height:auto!important;max-height:97vh!important;display:block}
.card{right:auto!important;left:clamp(20px,4vw,52px)!important;bottom:auto!important;top:50%!important;transform:translateY(-50%);width:min(36vw,410px)!important;max-height:76vh!important;z-index:20}
.hint{z-index:8}
.stops{position:fixed;right:clamp(14px,2.5vw,30px);top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:11px}
.stops i{width:9px;height:9px;border-radius:50%;background:var(--line);transition:background .3s,transform .3s}
.stops i.on{background:var(--net);transform:scale(1.4)}
.tourhint{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:30;font-family:var(--mono);font-size:.74rem;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:rgba(13,18,32,.6)}
.outro{min-height:70vh;display:flex;align-items:center;border-top:1px solid var(--line);background:linear-gradient(180deg,#0f1626,#0d1220);max-width:1180px;margin:0 auto;padding:0 clamp(18px,4vw,40px)}
.outro h2{margin:.3em 0 0;font-size:clamp(1.4rem,2.8vw,2rem);font-weight:800;letter-spacing:-.025em}
.outro h2 .g{color:var(--game)}
.outro p{margin:.8em 0 0;color:var(--mut);max-width:56ch;font-size:1.02rem}
/* spotlight vignette on focus — 주변부를 완전히 죽이지 않고 은은하게만 눌러 다른 부품도 어느정도 보이게 */
.vignette{position:fixed;inset:0;z-index:15;pointer-events:none;opacity:0;transition:opacity .55s ease;
  background:radial-gradient(ellipse 60% 56% at 52% 46%, transparent 30%, rgba(6,9,16,.30) 64%, rgba(3,5,10,.60) 100%)}
.vignette.on{opacity:1}
#scene text,#scene .ndlbl{transition:opacity .45s ease, filter .45s ease}
#scene.focus text{opacity:.24}                                       /* 주변 라벨: 스포트라이트 밖 흰 글자를 더 눌러 포커스 라벨이 도드라지게 */
#scene.focus .ndlbl.lit text{opacity:1; fill:#ffffff}                /* 카메라가 앉은 부품 이름엔 '불'이 들어옴 */
#scene.focus .ndlbl.lit{filter:drop-shadow(0 0 6px var(--gc,#6cc7ff))}
@media(max-width:820px){ .card{position:static!important;transform:none!important;width:auto!important;margin:16px} .stops,.tourhint{display:none} .viewport{position:static;height:auto} }

</style>
</head>
<body>

<div class="prog" id="prog"></div>
<header class="intro"><div class="in">
  <div class="eb"><span class="dot"></span>설계 · 구현 · 카메라 투어</div>
  <h1>패킷이 흐르는 <span class="g">공장</span> 위를,<br>스크롤로 훑어봅니다</h1>
  <p>골격은 기존 서버 구조도 그대로입니다 — 접속(왼쪽 아래)에서 저장(오른쪽 위)까지, 화물이 벨트를 흐르는 한 장.
    스크롤하면 <b>카메라가 부품으로 팬·줌</b>해 내려앉고, 그 부품의 <b>설계·구현</b>이 옆에 열립니다.</p>
  <span class="cue"><span class="m"></span>스크롤해서 이륙</span>
</div></header>

<section class="tour" id="tour">
  <div class="viewport" id="viewport">
    <div class="stage" id="stage">
      <svg id="scene" viewBox="82 12 792 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="아이소메트릭 서버 구조도"></svg>
      <div class="card" id="card"><div id="cardbd"></div></div>
      <div class="hint">시간 흐름 = 왼쪽 아래 → 오른쪽 위</div>
    </div>
  </div>
</section>

<footer class="outro"><div>
  <div class="eb"><span class="dot"></span>한 장의 공장, 여덟 결정</div>
  <h2>부품마다 <span class="g">왜 그렇게 만들었는지</span>가 이 공장 위에서 이어집니다.</h2>
  <p>접속부터 저장까지 한 장에 담고, 스크롤이 시선을 옮깁니다. 각 부품의 자세한 근거는 노션 원문으로.</p>
</div></footer>

<script>

"use strict";
(function(){
const NS="http://www.w3.org/2000/svg";
const $=s=>document.querySelector(s);
const svg=$("#scene");
const RM=matchMedia("(prefers-reduced-motion: reduce)").matches;
function el(t,a,txt){const e=document.createElementNS(NS,t);if(a)for(const k in a)e.setAttribute(k,a[k]);if(txt!=null)e.textContent=txt;return e;}

/* ─────────── 설계·실험 데이터 (실측 반영) ─────────── */
const ND={
  client:{nm:"클라이언트", x:"×4,000", zone:"네트워크", impl:"세션은 인덱스 슬롯으로 관리합니다. 슬롯 재사용 시 sessionId 검사로 옛 세션(ABA)을 차단합니다.",
    docs:["세션 관리 방식과 세션 ABA 문제 해결"], bns:[]},
  accept:{nm:"Accept", x:"×1", zone:"네트워크", impl:"수락 전담 스레드 1개. AcceptEx 대신 blocking accept를 택한 근거를 문서로 정리했습니다.",
    docs:["AcceptThread 분리 (AcceptEx 미사용)"], bns:[]},
  iocp:{nm:"IOCP 워커", x:"×N", zone:"네트워크", impl:"완료 통지 처리와 패킷 파싱. 워커는 파싱한 이벤트를 공유 큐에 쌓고, 게임 루프는 틱마다 std::queue::swap 한 번으로 큐를 통째로 로컬에 넘겨받아(락 1회·무복사) 락 없이 소비합니다. 세션당 I/O 1회 제한·Timing Wheel 타임아웃도 여기서 얽힙니다.",
    docs:["세션당 Recv/Send 1회 제한","Timing Wheel (타임아웃)","Worker→Game SwapQ"], bns:[]},
  send:{nm:"Send 워커", x:"×K", zone:"네트워크", impl:"송신 제출을 게임 틱에서 떼어 K개 워커로 분산합니다. uniqueId%K 고정 배분(sessionId 상위 인덱스 비트 누수 방지).",
    docs:["SendThread 분리 유무와 이슈"], bns:[["ok","Send Coalescing — syscall −94%"],["ok","SendThread 분리 — p99 −56%"],["rj","SendQ LockFree — 기각"],["rj","SO_SNDBUF=0 — 기각"],["ok","WT×K 스윕 — WT4·K2"]]},
  loop:{nm:"게임 루프", x:"×1", zone:"게임", impl:"모든 게임 로직이 도는 단일 코어. 섹터 격자 관심영역, per-player viewlist 미채택 근거가 핵심입니다.",
    docs:["섹터/맵 크기 · viewlist 미채택 이유"], bns:[["ok","섹터 묶음 패킷 — tick p99 −83%"],["ok","멤버십 팬아웃 dedup+묶음 — −68%"],["ok","수신섹터 묶음 — 복사 −88%·게임루프 0.57→0.21코어"]]},
  dbw:{nm:"DB 워커", x:"×1", zone:"저장", impl:"저장은 게임 스레드를 막지 않게 비동기 전담 워커로 분리합니다. 변경분(dirty)만 골라 주기마다 batch로 한 번에 넘깁니다(fire-and-forget). accountId%K 풀로 확장 가능하며 현재 1개 운영.",
    docs:["dirty 선별·주기 batch 저장","DB Thread 분리 및 저장 설계"], bns:[]},
  mysql:{nm:"MySQL", x:"", zone:"저장", impl:"주기적 스냅샷 UPSERT로 영속화합니다.",
    docs:[], bns:[]},
  monitor:{nm:"Monitor", x:"×1", zone:"관측", impl:"각 스레드가 Interlocked로 갱신하는 카운터를 별도 HTTP 스레드가 /metrics로 노출합니다. Prometheus가 수집하고 Grafana로 상시 관측 — '주장 대신 실측'의 출처입니다. 패킷 경로 밖 사이드카라 흐름과 분리돼 있습니다.",
    docs:["Prometheus /metrics 익스포터","tick·CPU·송신 지표 상시 계측"], bns:[]},
};

/* ─────────── 아이소메트릭 투영 (fan-up: 아래→위 상승) ─────────── */
const KX=0.86, KY=0.46, OX=178, OY=430;
const px=(u,v)=>OX+(u-v)*KX;           /* 가로: u 오른쪽 / v 왼쪽 (이전과 동일) */
const py=(u,v,z)=>OY-(u+v)*KY-z;       /* 세로: u+v 커질수록 위로 상승, z 위 */
const P=(u,v,z)=>px(u,v).toFixed(1)+","+py(u,v,z).toFixed(1);
function poly(pts,fill,extra){return el("polygon",Object.assign({points:pts.map(p=>P(p[0],p[1],p[2]||0)).join(" "),fill},extra||{}));}
/* 카메라 근접면(윗면 + u면 + v면)을 그린다 */
function prism(g,u,v,w,d,z0,h,c){
  const t=z0+h;
  g.appendChild(poly([[u,v,t],[u+w,v,t],[u+w,v,z0],[u,v,z0]],c[2]));                 /* v면(오른쪽 아래 향) */
  g.appendChild(poly([[u,v,t],[u,v+d,t],[u,v+d,z0],[u,v,z0]],c[1]));                 /* u면(왼쪽 아래 향) */
  g.appendChild(poly([[u,v,t],[u+w,v,t],[u+w,v+d,t],[u,v+d,t]],c[0],
    {class:"top",stroke:"rgba(255,255,255,.16)","stroke-width":1,"stroke-linejoin":"round"}));   /* 윗면 + 림라이트 */

  gFront.appendChild(el("line",{x1:px(uS-RW-2,v+gv/2),y1:py(uS-RW-2,v+gv/2,10),x2:px(uS+RW+2,v+gv/2),y2:py(uS+RW+2,v+gv/2,10),

if(!RM){
  function seg(wp){ const s=[]; let tot=0;
    for(let i=1;i<wp.length;i++){ const l=Math.hypot(wp[i][0]-wp[i-1][0],wp[i][1]-wp[i-1][1]);
      s.push({a:wp[i-1],b:wp[i],l,acc:tot}); tot+=l; } return {s,tot}; }
  function at(R,d){ d=((d%R.tot)+R.tot)%R.tot;
    const g=R.s.find(x=>d<=x.acc+x.l)||R.s[R.s.length-1], t=(d-g.acc)/g.l;
    return [g.a[0]+(g.b[0]-g.a[0])*t, g.a[1]+(g.b[1]-g.a[1])*t]; }
  /* 수신 피더 — 각 워커로 개별 4레일. lane0=맨 위 워커(1번)…lane3=맨 아래(4번) → 위(1)부터 차례로 유입 */
  const FEED=[264,286,308,330].map(uc=>seg([[86,44],[217,44],[217,18],[uc,18],[uc,35.5],[uc,46],[341,46],[341,62],[371,62]]));
  /* 응답 2 경로: 각 Send 박스(v=132·158)로 나눠 들어감 → 앞 레인 합류 → 크라우드 앞(75,108)에서 페이드 */
  const SEND0=seg([[420,126],[420,132],[234,132],[234,166],[85,166],[85,100]]);   /* 게임→Send 박스0→크라우드(레인0 개별 도달) */
  const SEND1=seg([[420,126],[420,158],[234,158],[234,184],[72,184],[72,116]]);   /* 게임→Send 박스1→크라우드(레인1 개별 도달) */
  const STORE=seg([[462,96],[526,96],[526,44],[582,44],[688,42]]);   /* 게임→코너→dirty 탱크→DB 관통→MySQL */
  const STORE_GATE=STORE.s[1].acc+STORE.s[1].l;   /* [516,44] dirty 탱크 = 배치 게이트 */
  const TANK_U=526, TANK_V=44;   /* dirty 탱크 위치 */
  const chips=[];
  function mk(R,color,off,batch){ const e=el("polygon",{points:"0,0",fill:color}); gChipBack.appendChild(e);   /* 응답·저장 칩도 건물 뒤로 */
    const c={e,R,d:off||0,color,batch:!!batch,state:"in",slot:-1,swapb:false,gate:-1}; chips.push(c); return c; }
  /* SwapQ = 모아서 통째로 넘김. 파랑을 3역할로 분리: 유입 피더(클라→워커→공유 큐)·공유 큐 파일(카운터 적재)·유출 드레인(로컬 큐→게임).
     루프칩 1개가 틱당 1개만 게이트를 지나 '쌓임'이 안 보이던 문제 → 파일을 카운터로 구동, 매 틱 공유 큐에 무리가 쌓였다가 통째로 스왑 */
  const feeders=[]; for(let i=0;i<18;i++){ const e=el("polygon",{points:"0,0",fill:"#6cc7ff"}); gChipBack.appendChild(e); feeders.push({e,d:0,state:"wait",lane:0}); }   /* 건물 뒤로 → Accept·IOCP 워커가 가림 */
  let feedTimer=0, feedLane=0, recvStarted=false;   /* 시작 시 전부 대기(빈 화면) → 아래 워커부터 한 개씩 순환 방출. 첫 도착 후 공유 큐 적재 시작 */
  const FEED_INTERVAL=0.25;             /* 파랑 한 개씩 방출 간격 */
  const DRAIN=seg([[SWAP.uS,SWAP.v],[425,SWAP.v],[425,80]]);   /* 로컬 큐(앞·아래 v)→게임 앞변 */
  const drains=[]; for(let i=0;i<12;i++){ const e=el("polygon",{points:"0,0",fill:"#6cc7ff"}); gChipBack.appendChild(e); drains.push({e,d:0,state:"wait",delay:0}); }   /* 드레인도 건물 뒤로 */
  /* 공유/로컬 큐 대기열 칩(최대 QMAX개, 한 줄로 줄서기) — 카운터 qShared로 적재, 틱마다 줄 통째 hop.
     트레이가 작아 칩을 많이 넣으면 뭉치므로, 적은 수를 넓게 벌려 벨트를 따라 뒤로 늘어선 줄로 표현 */
  const QMAX=4;   /* 공유큐: 피더 도착마다 1개씩 이산 적립 → 4개 차면 스왑 */
  const pileChips=[]; for(let i=0;i<QMAX;i++){ const e=el("polygon",{points:"0,0",fill:"#8ad4ff"}); gChip.appendChild(e); pileChips.push(e); }
  const QHEAD=12, QSTEP=6;   /* 머리(u=uS+QHEAD)에서 iso-u 따라 뒤로 QSTEP 간격 한 줄(4개) — 슬롯 안에 정렬 */
  /* 주황(응답)·초록(저장) — 게임에 파랑이 들어간 직후 함께 방출. 평소엔 게임 앞에서 대기(wait) */
  const emitO=[], emitG=[];
  for(let i=0;i<26;i++){ const c=mk(i%2?SEND1:SEND0,"#ffb648"); c.state="wait"; emitO.push(c); }   /* 절반씩 두 Send 박스 경로에 배정 · 밀도↑ */
  let sendToggle=0, sendTimer=0;   /* 방출 시 두 박스 번갈아 */
  const SEND_INTERVAL=0.17;   /* 응답 칩 방출 간격(작을수록 촘촘) */
  const CAP=16;   /* dirty 정사각형 = 4×4 */
  for(let i=0;i<8;i++){ const c=mk(STORE,"#57d694",0,true); c.state="wait"; emitG.push(c); }
  function setChip(e,x,y){ e.setAttribute("points",
    `${x.toFixed(1)},${(y-3).toFixed(1)} ${(x+5).toFixed(1)},${y.toFixed(1)} ${x.toFixed(1)},${(y+3).toFixed(1)} ${(x-5).toFixed(1)},${y.toFixed(1)}`); }
  /* dirty 배치 = 작은 사각형이 4×4 격자를 셀 단위로 채워감(부드럽게 안착) → 가득 차면 batch 크레이트로 묶여 레일 타고 DB로 */
  const BN=4, BC=8;                                  /* 4×4 격자, 셀 변=8 → 수집 정사각형 변=32(수집함 H=17에 맞춤) */
  function tilePts(u,v){ const q=0.6;                /* 셀 코너(u,v) → 수집함 윗면(z14) iso 타일 */
    return [[u+q,v+q],[u+BC-q,v+q],[u+BC-q,v+BC-q],[u+q,v+BC-q]].map(p=>px(p[0],p[1]).toFixed(1)+","+py(p[0],p[1],14).toFixed(1)).join(" "); }
  const originTiles=(function(){ const a=[]; for(let i=0;i<BN*BN;i++){ const e=el("polygon",{points:"0,0",fill:"#5fd39a",stroke:"#0d2115","stroke-width":.7,opacity:"0"}); gChip.appendChild(e); a.push(e); } return a; })();
  const cellUV=(cu,cv,i)=>{ const c=i%BN, r=(i/BN)|0; return [cu+(c-BN/2)*BC, cv+(r-BN/2)*BC]; };
  originTiles.forEach((e,i)=>{ const p=cellUV(TANK_U,TANK_V,i); e.setAttribute("points",tilePts(p[0],p[1])); });   /* 수집 격자: 고정 위치 */
  /* batch 크레이트 — z0=9 바닥에 접지해 레일 위를 미끄러지는 솔리드 상자(붕뜸 방지: 접지 그림자 + 레일폭=상자폭) */
  const crate=el("g"); gChip.appendChild(crate);
  const CW=20, CH=12, TANK_SX=px(TANK_U,TANK_V), TANK_SY=py(TANK_U,TANK_V,0);
  crate.appendChild(el("ellipse",{cx:TANK_SX,cy:py(TANK_U,TANK_V,0)+5,rx:CW*0.62,ry:CW*0.24,fill:"#04120a",opacity:.5}));   /* 접지 그림자 */
  prism(crate,TANK_U-CW/2,TANK_V-CW/2,CW,CW,9,CH,["#43b884","#123322","#1f5f40"]);
  crate.appendChild(el("text",{x:TANK_SX,y:py(TANK_U,TANK_V,9+CH)-1,"text-anchor":"middle","font-size":"8.5","font-weight":"800",fill:"#eafff4","font-family":"var(--mono)"},"batch"));
  crate.setAttribute("opacity","0");
  let batchN=0, tankState="fill", packT=0, moveP=0, settleReserved=0;
  let qShared=0, hopActive=false, hopT=1, hopN=0;   /* SwapQ 대기열 */
  let run=false, raf=0, prev=0, t=0, lastTick=-1;
  let emitQ=[];               /* 게임 방출 예약 큐 — 지연(>틱)이라 여러 건이 파이프라인으로 겹쳐 흐름 */
  const DRAIN_SPEED=120;      /* 로컬 큐→게임 유입(파랑) 속도 — 과하게 빠르지 않게 */
  const PROC_HOLD=1.0;        /* 게임루프 처리시간 은유: 파랑이 게임에 도달한 뒤 1.0초 지나 노랑·초록 방출 */
  let prevFlow=false;
  function resetCargo(){   /* 전원 OFF: 흐르던 화물을 전부 대기로 되돌려 벨트를 비운다(재진입 시 처음부터) */
    feeders.forEach(f=>{f.state="wait";f.d=0;});
    drains.forEach(d=>{d.state="wait";d.d=0;d.delay=0;});
    chips.forEach(c=>{c.state="wait";c.d=0;});
    qShared=0; hopActive=false; hopT=1; hopN=0; emitQ.length=0;
    feedTimer=0; sendTimer=0; feedLane=0; sendToggle=0; recvStarted=false;
    batchN=0; settleReserved=0; tankState="fill"; packT=0; moveP=0;
  }
  function frame(now){
    if(!run) return;
    const dt=Math.min(.05,(now-prev)/1000); prev=now; t+=dt;
    const flowOn=document.body.classList.contains('flow-on');   /* 스크롤로 투어에 진입해야 '데이터'가 흐르기 시작(그 전엔 정지된 공장) */
    if(flowOn!==prevFlow){ if(!flowOn) resetCargo(); prevFlow=flowOn; }
    const TICK=0.6, tickN=Math.floor(t/TICK);
    const swapPulse=(tickN!==lastTick);
    lastTick=tickN;
    if(flowOn){
    /* SwapQ 스왑(매 틱): 공유 큐 대기열을 통째로 로컬 큐로 hop. 방출 예약은 파랑이 게임에 실제 도달한 뒤(hop 완료 블록에서) */
    if(!hopActive && qShared>=QMAX){ hopN=qShared; qShared=0; hopT=0; hopActive=true; }   /* 3개 차면 즉시 스왑 */
    /* 게임 방출: 파랑이 게임 도달 후 PROC_HOLD(1.5s) 지나면 주황(응답)+초록(저장) 방출. 예약 큐를 순서대로 소진 */
    while(emitQ.length && t>=emitQ[0]){ emitQ.shift();
      const gif=emitG.filter(c=>c.state==="flow"||c.state==="settle").length;   /* 안착 중인 것도 in-flight로 카운트(CAP 초과 방지) */
      if(tankState==="fill" && batchN+gif<CAP){ const gg=emitG.find(c=>c.state==="wait"); if(gg){ gg.state="flow"; gg.d=0; } }
    }
    /* 응답(주황) 방출 — 게임이 계속 응답을 내보냄. 촘촘한 스트림(SEND_INTERVAL) → 게임→Send→클라 모두 밀도↑ */
    sendTimer+=dt;
    if(recvStarted && sendTimer>=SEND_INTERVAL){ sendTimer-=SEND_INTERVAL;
      const sp=(sendToggle++&1)?SEND1:SEND0;
      const o=emitO.find(c=>c.state==="wait"&&c.R===sp)||emitO.find(c=>c.state==="wait"); if(o){ o.state="flow"; o.d=0; } }
    /* 파랑 유입: 클라에서 한 개씩 방출(시작 시 빈 화면). 단일 레일로 게이트까지, 첫 도착 시 recvStarted */
    feedTimer+=dt;
    if(feedTimer>=FEED_INTERVAL){ feedTimer-=FEED_INTERVAL; const f=feeders.find(x=>x.state==="wait"); if(f){ f.state="flow"; f.d=0; f.lane=feedLane; feedLane=(feedLane+1)%4; } }   /* 아래(lane0)부터 순환 */
    feeders.forEach(f=>{ if(f.state!=="flow") return; f.d+=78*dt; if(f.d>=FEED[f.lane].tot){ f.state="wait"; f.d=0; recvStarted=true; if(!hopActive && qShared<QMAX) qShared++; } });   /* 도착마다 공유큐 +1 */
    /* 공유 큐 적재: 피더 도착 시 1개씩(위 블록). 3개(QMAX) 차면 스왑 — 연속 카운터 제거 */
    /* 스왑 hop: 공유 큐 무리를 통째로 로컬 큐로(0.16s ease). 끝나면 그만큼 드레인 방출 */
    if(hopActive){ hopT=Math.min(1,hopT+dt/0.16);
      if(hopT>=1){ hopActive=false; let rel=0;
        drains.forEach(dr=>{ if(rel<hopN && dr.state==="wait"){ dr.state="flow"; dr.d=0; dr.delay=rel*0.03; rel++; } });
        emitQ.push(t + DRAIN.tot/DRAIN_SPEED + PROC_HOLD); } }   /* 파랑 게임 도달(이동시간)+처리 hold 뒤 방출 예약 */
    /* 파랑 유출 드레인: 로컬 큐→게임(짧게 지연 스태거) */
    drains.forEach(dr=>{ if(dr.state!=="flow") return; if(dr.delay>0){ dr.delay-=dt; return; } dr.d+=DRAIN_SPEED*dt; if(dr.d>=DRAIN.tot){ dr.state="wait"; dr.d=0; } });
    /* 주황 update: flow 중인 것만 진행, 끝나면 대기 */
    emitO.forEach(c=>{ if(c.state!=="flow") return; c.d+=128*dt; if(c.d>=c.R.tot){ c.state="wait"; c.d=0; } });
    /* 초록 update: 탱크 도착→목표 셀에 안착(settle, 부드럽게). settle 끝나면 batchN++. 가득(CAP) 차면 flush */
    emitG.forEach(c=>{
      if(c.state==="flow"){ c.d+=75*dt;
        if(c.d>=STORE_GATE){ if(tankState==="fill"){ c.state="settle"; c.settleT=0; c.cellIdx=batchN+settleReserved; settleReserved++; } else c.d=STORE_GATE; } }
      else if(c.state==="settle"){ c.settleT=Math.min(1,c.settleT+dt/0.22);
        if(c.settleT>=1){ c.state="wait"; c.d=0; batchN++; settleReserved--;
          if(batchN>=CAP && tankState==="fill"){ tankState="flush"; packT=0; moveP=0; } } }
    });
    /* flush: (1) 격자→크레이트 크로스페이드(pack) → (2) 크레이트가 접지한 채 레일 타고 DB로 미끄러짐(ease) */
    if(tankState==="flush"){ if(packT<1) packT=Math.min(1,packT+dt/0.18);
      else { moveP=Math.min(1,moveP+dt/0.9); if(moveP>=1){ tankState="fill"; batchN=0; } } }
    }   /* end if(flowOn) — 이하 렌더는 상태 기반이라 정지 시 자동으로 빈 벨트가 그려짐 */
    /* 렌더: 주황(응답) — 대기=숨김, flow=양끝 페이드 */
    chips.forEach(c=>{ if(c.batch) return;                /* 초록은 아래 블록 */
      if(c.state!=="flow"){ c.e.setAttribute("opacity","0"); return; }
      const p=at(c.R,c.d); setChip(c.e,px(p[0],p[1]),py(p[0],p[1],9));
      c.e.setAttribute("opacity",Math.max(0,Math.min(1,c.d/20,(c.R.tot-c.d)/14)).toFixed(2)); });
    /* 렌더: 파랑 유입 피더(단일 레일, 대기=숨김, 양끝 페이드 — 게이트서 공유 큐로 흡수) */
    feeders.forEach(f=>{ if(f.state!=="flow"){ f.e.setAttribute("opacity","0"); return; } const R=FEED[f.lane], p=at(R,f.d); setChip(f.e,px(p[0],p[1]),py(p[0],p[1],9));
      f.e.setAttribute("opacity",Math.max(0,Math.min(1,f.d/16,(R.tot-f.d)/14)).toFixed(2)); });
    /* 렌더: 공유/로컬 큐 대기열 — 평소엔 공유 큐에 한 줄로 줄서고, hop 중엔 줄 통째로 로컬 큐로 미끄러짐 */
    { const nS=hopActive?hopN:Math.round(qShared), es=hopActive?(hopT<0.5?2*hopT*hopT:1-Math.pow(-2*hopT+2,2)/2):0;
      const uHead=SWAP.uS+QHEAD, vChip=SWAP.v+SWAP.gv*(1-es);   /* 공유(v+gv, 뒤·위)에 4개 쌓였다가 스왑 시 로컬(v, 앞·아래)로 통째 이동 */
      pileChips.forEach((e,i)=>{ if(i>=nS){ e.setAttribute("opacity","0"); return; }
        const u=uHead-i*QSTEP; setChip(e,px(u,vChip),py(u,vChip,9)); e.setAttribute("opacity","1"); }); }
    /* 렌더: 파랑 유출 드레인(로컬 큐→게임) */
    drains.forEach(dr=>{ if(dr.state!=="flow"||dr.delay>0){ dr.e.setAttribute("opacity","0"); return; }
      const p=at(DRAIN,dr.d); setChip(dr.e,px(p[0],p[1]),py(p[0],p[1],9));
      dr.e.setAttribute("opacity",Math.max(0,Math.min(1,dr.d/12,(DRAIN.tot-dr.d)/12)).toFixed(2)); });
    /* 렌더: 초록 칩 — flow(게임→탱크 페이드인) · settle(탱크 중심→목표 셀로 안착하며 페이드아웃 = 셀이 채워짐) */
    chips.forEach(c=>{ if(!c.batch) return;
      if(c.state==="flow"){ const p=at(c.R,c.d); setChip(c.e,px(p[0],p[1]),py(p[0],p[1],9));
        c.e.setAttribute("opacity",Math.min(1,c.d/20).toFixed(2)); }
      else if(c.state==="settle"){ const a=at(STORE,STORE_GATE), cl=cellUV(TANK_U,TANK_V,c.cellIdx);
        const es=c.settleT<0.5?2*c.settleT*c.settleT:1-Math.pow(-2*c.settleT+2,2)/2;
        const u=a[0]+(cl[0]+BC/2-a[0])*es, v=a[1]+(cl[1]+BC/2-a[1])*es;
        setChip(c.e,px(u,v),py(u,v,9+5*es)); c.e.setAttribute("opacity",(1-c.settleT*0.65).toFixed(2)); }   /* 레일 z9 → 수집함 윗면 z14로 부드럽게 안착 */
      else c.e.setAttribute("opacity","0"); });
    /* 수집 격자: 안착 완료 셀=꽉참, 안착 중 셀=settleT로 서서히, flush pack 동안 전체 페이드아웃 */
    { const packFade=tankState==="flush"?(1-packT):1, st=emitG.find(c=>c.state==="settle");
      originTiles.forEach((e,i)=>{ let o=(i<batchN)?1:(st&&i===st.cellIdx?st.settleT:0);
        e.setAttribute("opacity",(o*packFade).toFixed(2)); }); }
    /* batch 크레이트: pack 동안 격자와 크로스페이드로 등장 → 접지한 채 레일 타고 DB 워커 앞까지 미끄러져 흡수(페이드아웃) */
    if(tankState==="flush"){ const DB_ARR=STORE_GATE+52;
      const es=moveP<0.5?2*moveP*moveP:1-Math.pow(-2*moveP+2,2)/2, d=STORE_GATE+(DB_ARR-STORE_GATE)*es, p=at(STORE,d);
      crate.setAttribute("transform","translate("+(px(p[0],p[1])-TANK_SX).toFixed(1)+","+(py(p[0],p[1],0)-TANK_SY).toFixed(1)+")");
      crate.setAttribute("opacity",Math.min(packT,Math.max(0,(DB_ARR-d)/16),1).toFixed(2)); }
    else crate.setAttribute("opacity","0");
    if(dirtyCountTxt) dirtyCountTxt.textContent = (tankState==="fill" && batchN>0) ? "×"+Math.min(CAP,batchN) : "";   /* flush 중엔 크레이트 batch 라벨에 넘겨줌 */
    /* 타이밍휠: 바늘 회전 + 슬롯 스캔/만료(빨강) + 하트비트 맥박 + 생존신호 유입 */
    if(twCursor){ const a=t*0.9-Math.PI/2;
      const ex=TW.cx+Math.cos(a)*TW.rx, ey=TW.cy+Math.sin(a)*TW.ry;
      const dxx=ex-TW.cx, dyy=ey-TW.cy, len=Math.hypot(dxx,dyy)||1, nx=-dyy/len*2.3, ny=dxx/len*2.3;
      twCursor.setAttribute("points",ex.toFixed(1)+","+ey.toFixed(1)+" "+(TW.cx+nx).toFixed(1)+","+(TW.cy+ny).toFixed(1)+" "+(TW.cx-nx).toFixed(1)+","+(TW.cy-ny).toFixed(1));
      const ca=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const EXP=5.5, ep=t%EXP, eidx=Math.floor(t/EXP)%12;
      twSlots.forEach((sl,i)=>{ let da=Math.abs(sl.a-ca); da=Math.min(da,2*Math.PI-da); const near=da<0.42;
        if(i===eidx && ep<1.3){
          if(ep<0.5){ sl.dot.setAttribute("fill","#ff6a5a"); sl.dot.setAttribute("r",(2+ep*4).toFixed(1)); sl.dot.setAttribute("opacity","1"); }
          else{ const f=(ep-0.5)/0.8; sl.dot.setAttribute("fill","#ff6a5a"); sl.dot.setAttribute("r",(4-f*2).toFixed(1)); sl.dot.setAttribute("opacity",(1-f).toFixed(2)); }
        } else { sl.dot.setAttribute("fill",near?"#cfeaff":"#4a6b8f"); sl.dot.setAttribute("r",near?"2.7":"1.7"); sl.dot.setAttribute("opacity",near?"1":"0.5"); } });
      const hb=0.5+0.5*Math.sin(t*1.6);
      twPulse.setAttribute("opacity",(0.35+0.55*hb).toFixed(2)); twPulse.setAttribute("r",(3+1.5*hb).toFixed(1)); }
    if(twSignals){ twSignals.forEach(sg=>{ const p=(t*0.5+sg.off)%1;
      sg.s.setAttribute("cx",(TW.cx+sg.dx*(1-p)).toFixed(1));
      sg.s.setAttribute("cy",(TW.cy+(TW.ry+16)*(1-p)).toFixed(1));
      sg.s.setAttribute("opacity",(0.8*Math.min(1,(1-p)*2.2)).toFixed(2)); }); }
    const ph=(t%0.6)/0.6;
    if(beacon){ beacon.setAttribute("opacity",(0.45+0.55*(1-ph)).toFixed(2)); beacon.setAttribute("r",(4.5+2.5*(1-ph)).toFixed(1)); }
    /* 섹터 AOI 팬아웃 — 중심 mover가 주기적으로 이웃 8섹터에 브로드캐스트(1→N) */
    if(AOI){ const rate=1.15, p=(t*rate)%1, reach=AOI.S*0.95;
      AOI.dirs.forEach((d,i)=>{ const u=AOI.cu+d[0]*reach*p, v=AOI.cv+d[1]*reach*p;
        setChip(AOI.chips[i],px(u,v),py(u,v,AOI.Z+2));
        AOI.chips[i].setAttribute("opacity",(0.95*Math.max(0,Math.min(1,p*3,(1-p)*3))).toFixed(2)); });
      AOI.pulse.setAttribute("r",(3.2+1.7*(1-p)).toFixed(1));
      AOI.pulse.setAttribute("opacity",(0.55+0.45*(1-p)).toFixed(2)); }
    raf=requestAnimationFrame(frame);
  }
  const io=new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting&&!run){ run=true; prev=performance.now(); raf=requestAnimationFrame(frame); }
    else if(!e.isIntersecting&&run){ run=false; cancelAnimationFrame(raf); }
  }),{threshold:.05});
  io.observe($("#stage"));
}
})();
</script>
<script>

(function(){
  var svg=document.getElementById('scene');
  var viewport=document.getElementById('viewport');
  var tourEl=document.getElementById('tour');
  var prog=document.getElementById('prog');
  var card=document.getElementById('card'), cardbd=document.getElementById('cardbd');
  var KX=0.86,KY=0.46,OX=178,OY=430;
  function px(u,v){return OX+(u-v)*KX;}
  function py(u,v,z){return OY-(u+v)*KY-(z||0);}
  var STOPS=[
    {fit:true, card:null},
    {u:52,v:52,z:9,hh:110, key:'client', card:{z:'네트워크',nm:'클라이언트',x:'×4,000',impl:'세션은 인덱스 슬롯으로 관리합니다. 슬롯 재사용 시 sessionId 검사로 옛 세션(ABA)을 차단합니다.',docs:['세션 관리 방식과 세션 ABA 문제 해결']}},
    {u:152,v:44,z:16,hh:96, key:'accept', card:{z:'네트워크',nm:'Accept',x:'×1',impl:'수락 전담 스레드 1개. AcceptEx 대신 blocking accept를 택한 근거를 문서로 정리했습니다.',docs:['AcceptThread 분리 (AcceptEx 미사용)']}},
    {u:300,v:33,z:12,hh:112, key:'iocp', card:{z:'네트워크',nm:'IOCP 워커 · SwapQ',x:'×N',impl:'완료 통지 처리·패킷 파싱. 워커는 이벤트를 공유 큐에 쌓고, 게임 루프는 틱마다 std::queue::swap 한 번으로 통째로 넘겨받아(락 1회·무복사) 락 없이 소비합니다.',docs:['세션당 Recv/Send 1회 제한','Timing Wheel (타임아웃)','Worker→Game SwapQ']}},
    {u:347,v:77,z:0,hh:142, key:'loop', card:{z:'게임',nm:'게임 루프 · 섹터 AOI',x:'×1',impl:'모든 게임 로직이 도는 단일 코어(단독 섬). 섹터 격자 관심영역으로 이동 1건을 이웃 9섹터에만 팬아웃, per-player viewlist는 미채택.',docs:['섹터/맵 크기 · viewlist 미채택 이유'],bns:[['ok','섹터 묶음 패킷 — tick p99 −83%'],['ok','멤버십 팬아웃 dedup+묶음 — −68%'],['ok','수신섹터 묶음 — 복사 −88%']]}},
    {u:234,v:135,z:18,hh:106, key:'send', card:{z:'네트워크',nm:'Send 워커',x:'×K',impl:'송신 제출을 게임 틱에서 떼어 K개 워커로 분산합니다. uniqueId%K 고정 배분(sessionId 상위 인덱스 비트 누수 방지).',docs:['SendThread 분리 유무와 이슈'],bns:[['ok','Send Coalescing — syscall −94%'],['ok','SendThread 분리 — p99 −56%'],['rj','SendQ LockFree — 기각'],['rj','SO_SNDBUF=0 — 기각']]}},
    {u:638,v:89,z:0,hh:98, key:'dbw mysql', card:{z:'저장',nm:'DB 워커 · MySQL',x:'×1',impl:'저장은 게임 스레드를 막지 않게 비동기 전담 워커로 분리합니다. 변경분(dirty)만 골라 주기마다 batch로 한 번에 UPSERT(fire-and-forget). DB가 죽어도 게임은 안 멈춥니다.',docs:['dirty 선별·주기 batch 저장','DB Thread 분리 및 저장 설계']}},
    {u:356,v:270,z:0,hh:95, key:'wheel', card:{z:'네트워크',nm:'Timing Wheel',x:'×1',impl:'별도 타이머 스레드. IOCP가 Recv마다 lock-free 큐로 REFRESH만 던지고, 바늘이 한 바퀴 돌면 무활동 세션이 만료됩니다. 휠은 단일 Writer라 락이 없습니다.',docs:['Timing Wheel (타임아웃 처리)']}},
    {fit:true, card:null}
  ];
  STOPS.forEach(function(s){ if(!s.fit){ s.scx=px(s.u,s.v); s.scy=py(s.u,s.v,s.z||0); } });
  var S=STOPS.length;

  var stopsEl=document.createElement('div'); stopsEl.className='stops';
  var dots=STOPS.map(function(){var d=document.createElement('i');stopsEl.appendChild(d);return d;});
  document.body.appendChild(stopsEl);
  var th=document.createElement('div'); th.className='tourhint'; th.textContent='스크롤 = 카메라 이동 · 건물 클릭도 가능'; document.body.appendChild(th);
  var vig=document.createElement('div'); vig.className='vignette'; document.body.appendChild(vig);

  var SVG_ASPECT=792/420;   // fixed: svg renders at natural aspect (height:auto), so keep viewBox aspect constant
  var ZOOM=1.72;            // >1 = zoom out (more context). tune here to taste.
  function vbOf(s){
    if(s.fit){ return [82,12,792,420]; }
    var hh=Math.min(s.hh*ZOOM, 200); return [s.scx-hh*SVG_ASPECT, s.scy-hh, hh*SVG_ASPECT*2, hh*2];
  }
  var vbs=[]; function recompute(){ vbs=STOPS.map(vbOf); }
  function applyVB(vb){ svg.setAttribute('viewBox', vb.map(function(n){return n.toFixed(1);}).join(' ')); }
  function lerpVB(a,b,t){ return a.map(function(x,k){return x+(b[k]-x)*t;}); }
  function smooth(t){return t*t*(3-2*t);}

  var cur=-1;
  function fillCard(c){
    var h='<button class="x" data-close aria-label="닫기">✕</button>';
    h+='<span class="k">공장 부지 · '+c.z+' 구역</span><h3>'+c.nm+'<span>'+(c.x||'')+'</span></h3><p class="lead">'+c.impl+'</p>';
    if(c.docs&&c.docs.length){ h+='<div class="lb">설계 문서 '+c.docs.length+'</div>'+c.docs.map(function(d){return '<div class="it"><span>'+d+'</span></div>';}).join(''); }
    if(c.bns&&c.bns.length){ h+='<div class="lb">병목 실험 '+c.bns.length+'</div>'+c.bns.map(function(x){return '<div class="it"><span class="rs '+x[0]+'">'+(x[0]==='ok'?'채택':'기각')+'</span><span>'+x[1]+'</span></div>';}).join(''); }
    cardbd.innerHTML=h;
  }
  function setActive(i){
    if(i!==cur){ cur=i;
      var c=STOPS[i].card;
      if(c){ fillCard(c); card.classList.add('on'); } else card.classList.remove('on');
      var focused=!!STOPS[i].card;
      vig.classList.toggle('on', focused);
      svg.classList.toggle('focus', focused);
      var lit=svg.querySelectorAll('.ndlbl.lit'); for(var q=0;q<lit.length;q++) lit[q].classList.remove('lit');
      (STOPS[i].key||'').split(' ').forEach(function(k){ if(!k) return;
        var es=svg.querySelectorAll('[data-lbl="'+k+'"]'); for(var q=0;q<es.length;q++) es[q].classList.add('lit'); });
    }
    dots.forEach(function(d,k){d.classList.toggle('on',k===i);});
  }
  function render(p){
    p=Math.max(0,Math.min(1,p));
    document.body.classList.toggle('flow-on', p>0.045);   /* 개요(맨 위)에선 정지, 줌이 시작되면 데이터 흐름 ON */
    var seg=p*(S-1), i=Math.max(0,Math.min(S-2,Math.floor(seg))), f=seg-i;
    var ef=f<0.5?0:smooth((f-0.5)/0.5);
    if(!vbs.length) recompute();
    applyVB(lerpVB(vbs[i],vbs[i+1],ef));
    setActive(ef<0.5?i:i+1);
  }
  var FLAT=false;
  function onScroll(){
    if(FLAT) return;
    var h=document.documentElement,max=h.scrollHeight-h.clientHeight;
    prog.style.width=(max>0?(h.scrollTop/max*100):0)+'%';
    var top=tourEl.offsetTop, scrollable=tourEl.offsetHeight-window.innerHeight;
    render(scrollable>0?(window.scrollY-top)/scrollable:0);
  }
  var UNIT=1.15;
  function sizeTour(){ tourEl.style.height=((S-1)*UNIT*100+100)+'vh'; recompute(); onScroll(); }
  sizeTour();
  window.addEventListener('scroll',onScroll,{passive:true});
  window.addEventListener('resize',sizeTour);
  render(0);

  var params=new URLSearchParams(location.search);
  if(params.has('stop')){
    var si=Math.max(0,Math.min(S-1,parseInt(params.get('stop'),10)||0));
    document.querySelector('.intro').style.display='none';
    document.querySelector('.outro').style.display='none';
    tourEl.style.height='100vh'; viewport.style.position='static';
    FLAT=true; recompute(); applyVB(vbs[si]); setActive(si);
    prog.style.width=(si/(S-1)*100)+'%';
  }
})();

</script>
</body>
